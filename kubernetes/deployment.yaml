apiVersion: apps/v1
kind: Deployment
metadata:
  name: asset-monitoring
  namespace: monitoring-example
  labels:
    app: asset-monitoring
    app.kubernetes.io/name: asset-monitoring
    app.kubernetes.io/version: "1.0.0"
    app.kubernetes.io/component: metrics-exporter
spec:
  replicas: 2
  selector:
    matchLabels:
      app: asset-monitoring
  template:
    metadata:
      labels:
        app: asset-monitoring
        app.kubernetes.io/name: asset-monitoring
        app.kubernetes.io/version: "1.0.0"
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
      containers:
        - name: asset-monitoring
          image: quay.io/dkirwan/asset_monitoring:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: RACK_ENV
              value: "production"
            - name: LOG_LEVEL
              value: "INFO"
            - name: APP_VERSION
              value: "1.0.0"
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "100m"
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            # Example: mount a writable volume for SQLite price history persistence.
            # Because readOnlyRootFilesystem is true, the DB file CANNOT live inside the image.
            # Recommended for durable history:
            #   1. Set replicas: 1 (SQLite files are not shared between pods)
            #   2. Provide a PersistentVolumeClaim (ReadWriteOnce is sufficient)
            #   3. Set PRICE_HISTORY_DB_PATH=/data/asset_history.db and
            #      optionally PRICE_HISTORY_RETENTION_DAYS in the container env.
            #
            # The /tmp emptyDir below can be used for short-term durability within a pod's
            # lifetime without a PVC (history survives container restarts but is lost on pod delete).
            #
            # - name: data
            #   mountPath: /data
      volumes:
        - name: tmp
          emptyDir: {}
        # Example PVC for durable price history (uncomment + create the PVC when enabling persistence):
        # - name: data
        #   persistentVolumeClaim:
        #     claimName: asset-monitoring-history
      restartPolicy: Always
      terminationGracePeriodSeconds: 30
      dnsPolicy: ClusterFirst
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  revisionHistoryLimit: 10
  progressDeadlineSeconds: 600
