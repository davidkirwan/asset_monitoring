plugins:
  - rubocop-rspec

AllCops:
  NewCops: enable
  TargetRubyVersion: 3.4
  Exclude:
    - 'vendor/**/*'
    - 'spec/fixtures/**/*'
    - 'coverage/**/*'

Layout/LineLength:
  Max: 120
  Exclude:
    - 'spec/**/*'

Style/Documentation:
  Enabled: false

Style/StringLiterals:
  EnforcedStyle: single_quotes

Style/FrozenStringLiteralComment:
  Enabled: true

Style/ClassAndModuleChildren:
  Enabled: false

Style/GuardClause:
  Enabled: false

Metrics/ClassLength:
  Max: 100
  Exclude:
    - 'lib/asset_monitoring.rb'
    - 'lib/portfolio_store.rb'
    - 'lib/price_history.rb'

Metrics/CyclomaticComplexity:
  Max: 7
  Exclude:
    - 'lib/portfolio_store.rb'

Metrics/PerceivedComplexity:
  Max: 8
  Exclude:
    - 'lib/portfolio_store.rb'

Metrics/AbcSize:
  Max: 25
  Exclude:
    - 'lib/portfolio_store.rb'

Metrics/MethodLength:
  Max: 20
  Exclude:
    - 'lib/portfolio_store.rb'

RSpec/MultipleDescribes:
  Exclude:
    - 'spec/price_history_store_spec.rb'

Metrics/BlockLength:
  Exclude:
    - 'spec/**/*'

RSpec/ExampleLength:
  Max: 10

RSpec/MultipleExpectations:
  Max: 5

RSpec/NestedGroups:
  Max: 4

RSpec/SpecFilePathFormat:
  Enabled: false
